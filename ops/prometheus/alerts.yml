groups:
  - name: clever_agents_api
    rules:
      - alert: ApiHighErrorRate
        expr: |
          sum(rate(http_requests_total{status_code=~"5.."}[5m]))
          /
          sum(rate(http_requests_total[5m])) > 0.02
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "API 5xx 错误率过高"
          description: "过去 5 分钟 5xx 错误率 > 2%。"

      - alert: ApiP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
          ) > 1.5
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "API P95 延迟过高"
          description: "过去 5 分钟 P95 延迟 > 1.5s。"

      - alert: ApiLowTrafficButErrors
        expr: |
          sum(rate(http_requests_total[5m])) < 0.2
          and
          sum(rate(http_requests_total{status_code=~\"5..\"}[5m])) > 0
        for: 5m
        labels:
          severity: ticket
        annotations:
          summary: "低流量下仍出现 5xx"
          description: "可能为启动/依赖异常或定时任务触发。"

